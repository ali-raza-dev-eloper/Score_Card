<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main-card">
        <div class="result-section">
            <h3>Your Result</h3>
            <div class="circle">
                <span class="score">76</span>
                <span class="of-100">of 100</span>
            </div>
            <h2>Great</h2>
            <p>You scored higher than 65%  of <br> the people who have taken <br> these tests.</p>
        </div>
        <div class="summary-section">
            <h3>Summary</h3>
            
            <div class="summary-items">
                <!-- Item 1 -->
                <div class="item reaction">
                    <span>⚡ Reaction</span>
                    <p><b>80</b> / 100</p>
                </div>
                <!-- Item 2 -->
                <div class="item memory">
                    <span>🧠 Memory</span>
                    <p><b>92</b> / 100</p>
                </div>
                <!-- Item 3 -->
                <div class="item verbal">
                    <span>💬 Verbal</span>
                    <p><b>61</b> / 100</p>
                </div>
                <!-- Item 4 -->
                <div class="item visual">
                    <span>👁️ Visual</span>
                    <p><b>73</b> / 100</p>
                </div>
            </div>

            <button class="btn">Continue</button>
        </div> 
    </div>
</body>
</html>
